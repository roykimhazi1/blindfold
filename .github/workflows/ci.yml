name: CI

on:
  push:
    branches: [master, main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: typecheck · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test (engine + agents)
        run: npm test

      - name: Leak-check gate
        run: node --test --experimental-strip-types "packages/engine/src/pipeline.test.ts" "packages/agents/src/orchestrator.test.ts"

      - name: Build
        run: npm run build
